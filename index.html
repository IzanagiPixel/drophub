const computeProductMetrics = (p) => {
  const totalFees = (p.adCost || 0) + (p.shippingCost || 0) + (p.platformFee || 0) + (p.otherFees || 0);
  const unitMargin = p.sellPriceHT - p.purchasePrice;
  const unitProfit = unitMargin - totalFees;
  const revenue = p.sellPriceTTC * p.unitsSold;
  const totalProfit = unitProfit * p.unitsSold;
  const marginPct = p.sellPriceHT > 0 ? (unitMargin / p.sellPriceHT) * 100 : 0;
  return { totalFees, unitMargin, unitProfit, revenue, totalProfit, marginPct };
};

const fmtEUR = (n, d = 2) => {
  if (n == null || isNaN(n)) return '—';
  return new Intl.NumberFormat('fr-BE', { style: 'currency', currency: 'EUR', minimumFractionDigits: d, maximumFractionDigits: d }).format(n);
};

  useEffect(() => {
    if (!start) return;
    startRef.current = performance.now();
    const tick = (t) => {
      const elapsed = t - startRef.current;
      const p = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      setValue(target * eased);
      if (p < 1) rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, [target, duration, start]);
  return value;
};

const ProductCard = ({ product, onClick }) => {
  const m = computeProductMetrics(product);
  const cardRef = useRef();

  const onMove = (e) => {
    const el = cardRef.current;
    if (!el) return;
    const r = el.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width - 0.5;
    const y = (e.clientY - r.top) / r.height - 0.5;
    el.style.transform = `translateY(-4px) rotateX(${-y * 4}deg) rotateY(${x * 6}deg)`;
  };
  const onLeave = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = '';
  };

  return (
    <div
      ref={cardRef}
      className="prod-card"
      onClick={onClick}
      onMouseMove={onMove}
      onMouseLeave={onLeave}
      style={{ transition: 'transform .2s cubic-bezier(.2,.8,.2,1), background .35s, border-color .35s, box-shadow .35s' }}
    >
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
        <div style={{
          width: 56, height: 56, borderRadius: 16,
          background: 'linear-gradient(135deg, rgba(139,92,246,.14), rgba(34,211,238,.06))',
          border: '1px solid var(--border)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 28,
        }}>{product.emoji}</div>
        <StatusBadge status={product.status} />

const Accounting = ({ products }) => {
  const [period, setPeriod] = useState('month');
  const [toast, setToast] = useState(null);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2500);
  };

  const csv = useMemo(() => {
    let s = 'Produit;SKU;Catégorie;Statut;Prix achat;Prix vente TTC;Frais totaux;Unités;CA;Bénéfice net\n';
    products.forEach(p => {
      const m = computeProductMetrics(p);
      s += `${p.name};${p.sku};${p.category};${p.status};${p.purchasePrice.toFixed(2)};${p.sellPriceTTC.toFixed(2)};${m.totalFees.toFixed(2)};${p.unitsSold};${m.revenue.toFixed(2)};${m.totalProfit.toFixed(2)}\n`;
    });
    return s;
  }, [products]);

  const downloadCSV = () => {
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `comptabilite_${new Date().toISOString().slice(0, 10)}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Export CSV téléchargé');
  };

  const quarterTotals = useMemo(() => {
    let totalRev = 0, totalExp = 0, totalProfit = 0;
    products.forEach(p => {
      const m = computeProductMetrics(p);
      totalRev += m.revenue;
      totalExp += m.totalFees * p.unitsSold;
      totalProfit += m.totalProfit;
    });
    const now = new Date();
    const q = Math.ceil((now.getMonth() + 1) / 3);
    const y = now.getFullYear();
    return [
      { label: `T${q} ${y}`, revenue: Math.round(totalRev), expenses: Math.round(totalExp), profit: Math.round(totalProfit), status: 'current' },
    ];
  }, [products]);

  const dynamicMonthly = useMemo(() => {
    const months = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Jun', 'Jul', 'Aoû', 'Sep', 'Oct', 'Nov', 'Déc'];
    const now = new Date();
    return Array.from({ length: 6 }, (_, i) => {
      const d = new Date(now.getFullYear(), now.getMonth() - 5 + i, 1);
      return { month: months[d.getMonth()], revenue: 0, expenses: 0, profit: 0 };
    });
  }, []);

  return (
    <div className="view" style={{ display: 'flex', flexDirection: 'column', gap: 22 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', gap: 12, flexWrap: 'wrap' }}>
        <div>
          <h1 style={{ fontSize: 30, fontWeight: 700, letterSpacing: '-0.03em', margin: 0 }}>
            Comptabilité <span className="font-display" style={{ fontStyle: 'italic', color: 'var(--text-2)' }}>& déclarations</span>
          </h1>
          <p style={{ color: 'var(--text-2)', margin: '6px 0 0', fontSize: 14 }}>Vue consolidée pour tes déclarations trimestrielles.</p>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <button className="btn-ghost" onClick={downloadCSV}><FileDown size={15} /> CSV</button>
          <button className="btn-primary" onClick={() => showToast('Export Excel généré')}><Download size={15} strokeWidth={2.5} /> Excel</button>
        </div>
      </div>

      {/* Period toggle */}
      <div className="seg" style={{ alignSelf: 'flex-start' }}>
        {[['month', 'Mensuel'], ['quarter', 'Trimestriel'], ['year', 'Annuel']].map(([v, l]) => (
          <button key={v} className={period === v ? 'on' : ''} onClick={() => setPeriod(v)}>{l}</button>
        ))}
      </div>

      {/* Summary cards */}
      <div className="stagger" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(230px, 1fr))', gap: 16 }}>
        {quarterTotals.map((q) => (
          <div key={q.label} className="surface" style={{ padding: 22, position: 'relative', overflow: 'hidden' }}>
            {q.status === 'current' && <div className="kpi-shine" />}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 18 }}>
              <span style={{ fontSize: 12, color: 'var(--text-2)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.08em' }}>{q.label}</span>
              {q.status === 'declared' && <span className="badge badge-active"><Check size={10} strokeWidth={2.5} /> Déclaré</span>}
              {q.status === 'final' && <span className="badge badge-winner"><AlertCircle size={10} strokeWidth={2.5} /> À déclarer</span>}
              {q.status === 'current' && <span className="badge badge-test"><CircleDot size={10} /> En cours</span>}
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 13, color: 'var(--text-2)' }}>CA</span>
                <span className="num" style={{ fontWeight: 600 }}>{fmtEUR(q.revenue, 0)}</span>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 13, color: 'var(--text-2)' }}>Dépenses</span>
                <span className="num" style={{ fontWeight: 600 }}>{fmtEUR(q.expenses, 0)}</span>

              <div className="hairline" style={{ margin: '6px 0' }} />
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>

                <span className="num" style={{ fontSize: 22, fontWeight: 700, background: 'var(--grad-accent)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>{fmtEUR(q.profit, 0)}</span>
              </div>

      </div>

      {/* Monthly breakdown table */}
      <div className="surface" style={{ padding: 0, overflow: 'hidden' }}>
        <div style={{ padding: '18px 22px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '1px solid var(--border)' }}>
          <div>

          </div>
          <span className="badge badge-active"><Check size={10} strokeWidth={2.5} /> Données vérifiées</span>
        </div>
        <div className="table-row" style={{ gridTemplateColumns: '1fr 1fr 1fr 1fr 1fr', background: 'rgba(255,255,255,.02)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '.06em', color: 'var(--text-2)', fontWeight: 600 }}>
          <div>Période</div>
          <div>CA</div>
          <div>Dépenses</div>
          <div>Bénéfice</div>
          <div style={{ textAlign: 'right' }}>À déclarer</div>
        </div>
        <div className="stagger">
          {dynamicMonthly.slice().reverse().map(m => (
            <div key={m.month} className="table-row" style={{ gridTemplateColumns: '1fr 1fr 1fr 1fr 1fr' }}>
              <div style={{ fontWeight: 600 }}>{m.month} {new Date().getFullYear()}</div>
              <div className="num">{fmtEUR(m.revenue, 0)}</div>
              <div className="num" style={{ color: m.expenses > 0 ? 'var(--rose)' : 'var(--text-2)' }}>{m.expenses > 0 ? '−' : ''}{fmtEUR(m.expenses, 0)}</div>
              <div className="num" style={{ fontWeight: 700, color: 'var(--emerald)' }}>{fmtEUR(m.profit, 0)}</div>
              <div className="num" style={{ textAlign: 'right', fontWeight: 600 }}>{fmtEUR(m.profit * 0.25, 0)}</div>

          ))}

      </div>

      {toast && (
        <div className="toast">
          <div style={{ width: 28, height: 28, borderRadius: 8, background: 'linear-gradient(135deg, #10B981, #34D399)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>

          <div style={{ fontSize: 13.5, fontWeight: 500 }}>{toast}</div>
        </div>

  );
};

const Categories = ({ products }) => {
  const cats = useMemo(() => {
    const m = {};
    products.forEach(p => {
      if (!m[p.category]) m[p.category] = { name: p.category, products: [], revenue: 0, profit: 0 };
      const pm = computeProductMetrics(p);
      m[p.category].products.push(p);
      m[p.category].revenue += pm.revenue;
      m[p.category].profit += pm.totalProfit;
    });
    return Object.values(m);
  }, [products]);

  const icons = { 'Ergonomie': '🪑', 'Décoration RGB': '💡', 'Productivité': '⚡', 'Gaming': '🎮' };

          <div key={c.name} className="surface" style={{ padding: 22, position: 'relative', overflow: 'hidden' }}>

              <div style={{
                width: 52, height: 52, borderRadius: 14,
                background: 'linear-gradient(135deg, rgba(139,92,246,.18), rgba(34,211,238,.08))',
                border: '1px solid var(--border)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 26, marginBottom: 14,
              }}>{icons[c.name] || '📦'}</div>
              <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4, letterSpacing: '-0.02em' }}>{c.name}</div>

              />
            </div>
            <div>
              <label className="lbl">Confirmer le mot de passe</label>
              <input
                className="field"
                type="password"
                placeholder="Confirmez le mot de passe"
                value={confirmPwd}
                onChange={(e) => { setConfirmPwd(e.target.value); setPwdError(''); }}
              />
            </div>
            {pwdError && (
              <div style={{ color: 'var(--rose)', fontSize: 13, display: 'flex', alignItems: 'center', gap: 6 }}>
                <AlertCircle size={13} /> {pwdError}
              </div>
            )}
            <div style={{ display: 'flex', gap: 10 }}>
              <button className="btn-primary" onClick={handleChangePwd}>Enregistrer</button>
              <button className="btn-ghost" onClick={() => { setShowChangePwd(false); setNewPwd(''); setConfirmPwd(''); setPwdError(''); }}>Annuler</button>
            </div>
          </div>
        )}
      </div>

      <div className="surface" style={{ padding: 24 }}>
        <h3 style={{ fontSize: 16, fontWeight: 700, margin: 0, marginBottom: 14 }}>Intégrations</h3>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {[
            { name: 'Shopify', status: 'connected', icon: '🛒' },
            { name: 'AliExpress', status: 'connected', icon: '📦' },
            { name: 'TikTok Ads', status: 'disconnected', icon: '🎥' },
            { name: 'Meta Ads', status: 'connected', icon: '📱' },
          ].map(i => (
            <div key={i.name} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 0', borderBottom: '1px solid var(--border)' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{ fontSize: 22 }}>{i.icon}</div>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{i.name}</div>
                  <div style={{ fontSize: 12, color: 'var(--text-2)' }}>{i.status === 'connected' ? 'Synchronisé' : 'Non connecté'}</div>
                </div>
              </div>
              {i.status === 'connected'
                ? <span className="badge badge-active"><Check size={10} strokeWidth={2.5} /> Connecté</span>
                : <button className="btn-ghost">Connecter</button>}
            </div>
          ))}
        </div>
      </div>
      <style>{`@media (max-width: 640px){ .set-grid { grid-template-columns: 1fr !important; } }`}</style>
    </div>
  );
};

const AddProductModal = ({ open, onClose, onSave, editProduct }) => {
  const isEdit = !!editProduct;
  const [step, setStep] = useState(0);
  const emptyForm = { name: '', emoji: '📦', category: 'Gaming', sku: '', supplier: '', supplierLink: '', shopLink: '', status: 'idea', purchasePrice: '', sellPriceHT: '', sellPriceTTC: '', adCost: '', shippingCost: '', platformFee: '', otherFees: '', stock: '', notes: '' };
  const [form, setForm] = useState(emptyForm);

  useEffect(() => {
    if (open) {
      setStep(0);
      if (isEdit) {
        setForm({
          name: editProduct.name || '',
          emoji: editProduct.emoji || '📦',
          category: editProduct.category || 'Gaming',
          sku: editProduct.sku || '',
          supplier: editProduct.supplier || '',
          supplierLink: editProduct.supplierLink || '',
          shopLink: editProduct.shopLink || '',
          status: editProduct.status || 'idea',
          purchasePrice: editProduct.purchasePrice != null ? String(editProduct.purchasePrice) : '',
          sellPriceHT: editProduct.sellPriceHT != null ? String(editProduct.sellPriceHT) : '',
          sellPriceTTC: editProduct.sellPriceTTC != null ? String(editProduct.sellPriceTTC) : '',
          adCost: editProduct.adCost != null ? String(editProduct.adCost) : '',
          shippingCost: editProduct.shippingCost != null ? String(editProduct.shippingCost) : '',
          platformFee: editProduct.platformFee != null ? String(editProduct.platformFee) : '',
          otherFees: editProduct.otherFees != null ? String(editProduct.otherFees) : '',
          stock: editProduct.stock != null ? String(editProduct.stock) : '',
          notes: editProduct.notes || '',
        });
      } else {
        setForm(emptyForm);
      }
    }
  }, [open, editProduct]);

  if (!open) return null;

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const save = () => {
    const product = {
      ...(isEdit ? editProduct : {}),
      id: isEdit ? editProduct.id : 'p-' + Date.now(),
      name: form.name || 'Nouveau produit',
      emoji: form.emoji || '📦',
      supplier: form.supplier || 'AliExpress',
      supplierLink: form.supplierLink,
      shopLink: form.shopLink,
      sku: form.sku || 'SKU-' + Math.floor(Math.random() * 9999),
      category: form.category,
      subCategory: '',
      status: form.status,
      purchasePrice: parseFloat(form.purchasePrice) || 0,
      sellPriceHT: parseFloat(form.sellPriceHT) || 0,
      sellPriceTTC: parseFloat(form.sellPriceTTC) || 0,
      adCost: parseFloat(form.adCost) || 0,
      shippingCost: parseFloat(form.shippingCost) || 0,
      platformFee: parseFloat(form.platformFee) || 0,
      otherFees: parseFloat(form.otherFees) || 0,
      stock: parseInt(form.stock) || 0,
      unitsSold: isEdit ? (editProduct.unitsSold || 0) : 0,
      notes: form.notes,
      addedAt: isEdit ? editProduct.addedAt : new Date().toISOString().slice(0, 10),
      updatedAt: new Date().toISOString().slice(0, 10),
    };
    onSave(product);
    onClose();
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div style={{ padding: '20px 24px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '1px solid var(--border)' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ width: 36, height: 36, borderRadius: 10, background: 'var(--grad-accent)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Plus size={18} strokeWidth={2.5} />
            </div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 16 }}>{isEdit ? 'Modifier le produit' : 'Nouveau produit'}</div>
              <div style={{ fontSize: 12, color: 'var(--text-2)' }}>Étape {step + 1} sur 3</div>
            </div>
          </div>
          <button className="btn-icon" onClick={onClose}><X size={16} /></button>
        </div>

        {/* Progress */}
        <div style={{ padding: '0 24px', marginTop: 16 }}>
          <div style={{ display: 'flex', gap: 6 }}>
            {[0, 1, 2].map(i => (
              <div key={i} style={{
                flex: 1, height: 3, borderRadius: 999,
                background: i <= step ? 'var(--grad-accent)' : 'var(--surface-hi)',
                transition: 'background .4s',
              }} />
            ))}
          </div>
        </div>

        <div style={{ padding: 24, overflowY: 'auto', flex: 1 }}>
          {step === 0 && (
            <div className="anim-fade" style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              <div>
                <label className="lbl">Nom du produit</label>
                <input className="field" value={form.name} onChange={(e) => set('name', e.target.value)} placeholder="Ex: Tapis XXL RGB gaming" />
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'auto 1fr 1fr', gap: 12 }}>
                <div>
                  <label className="lbl">Emoji</label>
                  <input className="field" value={form.emoji} onChange={(e) => set('emoji', e.target.value)} style={{ textAlign: 'center', fontSize: 20, width: 60 }} />
                </div>
                <div>
                  <label className="lbl">SKU</label>
                  <input className="field" value={form.sku} onChange={(e) => set('sku', e.target.value)} placeholder="GAM-MAT-10" />
                </div>
                <div>
                  <label className="lbl">Catégorie</label>
                  <input className="field" list="cat-list" value={form.category} onChange={(e) => set('category', e.target.value)} placeholder="Gaming, Mode, Tech..." />
                  <datalist id="cat-list">
                    <option value="Gaming" />
                    <option value="Ergonomie" />
                    <option value="Décoration RGB" />
                    <option value="Productivité" />
                    <option value="Mode" />
                    <option value="Maison" />
                    <option value="Beauté" />
                    <option value="Sport" />
                  </datalist>
                </div>
              </div>
              <div>
                <label className="lbl">Fournisseur</label>
                <input className="field" value={form.supplier} onChange={(e) => set('supplier', e.target.value)} placeholder="AliExpress / CJ / Spocket..." />
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                <div>
                  <label className="lbl">Lien fournisseur</label>
                  <input className="field" value={form.supplierLink} onChange={(e) => set('supplierLink', e.target.value)} placeholder="https://..." />
                </div>
                <div>
                  <label className="lbl">Lien boutique</label>
                  <input className="field" value={form.shopLink} onChange={(e) => set('shopLink', e.target.value)} placeholder="https://..." />
                </div>
              </div>
              <div>
                <label className="lbl">Statut</label>
                <div className="seg" style={{ width: '100%', display: 'flex' }}>
                  {Object.entries(STATUS_CONFIG).map(([k, v]) => (
                    <button key={k} className={form.status === k ? 'on' : ''} onClick={() => set('status', k)} style={{ flex: 1 }}>
                      {v.label}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}

          {step === 1 && (
            <div className="anim-fade" style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12 }}>
                <div><label className="lbl">Prix achat</label><input className="field" type="number" step="0.01" value={form.purchasePrice} onChange={(e) => set('purchasePrice', e.target.value)} placeholder="0.00" /></div>
                <div><label className="lbl">Prix vente HT</label><input className="field" type="number" step="0.01" value={form.sellPriceHT} onChange={(e) => set('sellPriceHT', e.target.value)} placeholder="0.00" /></div>
                <div><label className="lbl">Prix vente TTC</label><input className="field" type="number" step="0.01" value={form.sellPriceTTC} onChange={(e) => set('sellPriceTTC', e.target.value)} placeholder="0.00" /></div>
              </div>
              <div className="hairline" style={{ margin: '4px 0' }} />
              <div style={{ fontSize: 12, color: 'var(--text-2)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.08em' }}>Frais unitaires</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                <div><label className="lbl">Publicité</label><input className="field" type="number" step="0.01" value={form.adCost} onChange={(e) => set('adCost', e.target.value)} placeholder="0.00" /></div>
                <div><label className="lbl">Livraison</label><input className="field" type="number" step="0.01" value={form.shippingCost} onChange={(e) => set('shippingCost', e.target.value)} placeholder="0.00" /></div>
                <div><label className="lbl">Plateforme</label><input className="field" type="number" step="0.01" value={form.platformFee} onChange={(e) => set('platformFee', e.target.value)} placeholder="0.00" /></div>
                <div><label className="lbl">Autres</label><input className="field" type="number" step="0.01" value={form.otherFees} onChange={(e) => set('otherFees', e.target.value)} placeholder="0.00" /></div>
              </div>
              {/* Live preview */}
              {(form.sellPriceHT && form.purchasePrice) && (
                <div className="surface-hi" style={{ padding: 14, borderRadius: 14 }}>
                  <div style={{ fontSize: 11, color: 'var(--text-2)', textTransform: 'uppercase', letterSpacing: '.08em', fontWeight: 600, marginBottom: 8 }}>Aperçu calculé</div>
                  {(() => {
                    const fees = (+form.adCost || 0) + (+form.shippingCost || 0) + (+form.platformFee || 0) + (+form.otherFees || 0);
                    const margin = (+form.sellPriceHT || 0) - (+form.purchasePrice || 0);
                    const profit = margin - fees;
                    return (
                      <div style={{ display: 'flex', justifyContent: 'space-between', gap: 16 }}>
                        <div><div style={{ fontSize: 12, color: 'var(--text-2)' }}>Marge brute</div><div className="num" style={{ fontWeight: 700 }}>{fmtEUR(margin)}</div></div>
                        <div><div style={{ fontSize: 12, color: 'var(--text-2)' }}>Total frais</div><div className="num" style={{ fontWeight: 700, color: 'var(--rose)' }}>−{fmtEUR(fees)}</div></div>
                        <div><div style={{ fontSize: 12, color: 'var(--text-2)' }}>Bénéfice net</div><div className="num" style={{ fontWeight: 700, color: profit >= 0 ? 'var(--emerald)' : 'var(--rose)' }}>{fmtEUR(profit)}</div></div>
                      </div>
                    );
                  })()}
                </div>
              )}
            </div>
          )}

          {step === 2 && (
            <div className="anim-fade" style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              <div><label className="lbl">Stock initial</label><input className="field" type="number" value={form.stock} onChange={(e) => set('stock', e.target.value)} placeholder="0" /></div>
              <div><label className="lbl">Notes internes</label><textarea className="field" rows={5} value={form.notes} onChange={(e) => set('notes', e.target.value)} placeholder="Stratégie, idées, infos fournisseur..." style={{ resize: 'vertical' }} /></div>
              <div className="surface-hi" style={{ padding: 16, borderRadius: 14, display: 'flex', gap: 12, alignItems: 'flex-start' }}>
                <div style={{ width: 32, height: 32, borderRadius: 10, background: 'linear-gradient(135deg, rgba(139,92,246,.25), rgba(34,211,238,.15))', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <Sparkles size={16} style={{ color: 'var(--violet-hi)' }} />
                </div>
                <div>
                  <div style={{ fontSize: 13.5, fontWeight: 600, marginBottom: 3 }}>Prêt à ajouter</div>
                  <div style={{ fontSize: 12.5, color: 'var(--text-2)', lineHeight: 1.5 }}>Tu pourras modifier les données de vente et ajouter des ventes à tout moment depuis la fiche produit.</div>
                </div>
              </div>
            </div>
          )}
        </div>

        <div style={{ padding: '16px 24px', borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', gap: 12 }}>
          <button className="btn-ghost" onClick={step === 0 ? onClose : () => setStep(s => s - 1)}>
            {step === 0 ? 'Annuler' : 'Retour'}
          </button>
          {step < 2 ? (
            <button className="btn-primary" onClick={() => setStep(s => s + 1)}>Continuer <ArrowRight size={15} strokeWidth={2.5} /></button>
          ) : (
            <button className="btn-primary" onClick={save}>
              <Check size={15} strokeWidth={2.5} /> {isEdit ? 'Enregistrer les modifications' : 'Ajouter le produit'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
};

            <span className="badge" style={{ background: 'var(--surface-hi)', color: 'var(--text-1)', border: '1px solid var(--border)' }}>{product.category}</span>

            <div style={{ fontSize: 13, color: 'var(--text-2)', marginTop: 6 }}>

          </div>

          {/* Metrics grid */}
          <div className="stagger" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            {[

              { lbl: 'Prix vente HT', v: fmtEUR(product.sellPriceHT) },
              { lbl: 'Prix vente TTC', v: fmtEUR(product.sellPriceTTC) },

                <a href={product.supplierLink} target="_blank" rel="noreferrer" className="surface" style={{ padding: '14px 18px', display: 'flex', alignItems: 'center', gap: 12, textDecoration: 'none', color: 'inherit', transition: 'all .2s' }}
                  onMouseEnter={(e) => e.currentTarget.style.background = 'var(--surface-hover)'}
                  onMouseLeave={(e) => e.currentTarget.style.background = 'var(--surface)'}

                  <div style={{ width: 34, height: 34, borderRadius: 10, background: 'var(--surface-hi)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>🏭</div>

                  onMouseLeave={(e) => e.currentTarget.style.background = 'var(--surface)'}

                  }}
                />
                <button className="btn-primary" onClick={() => { onAddSales(product.id, parseInt(salesInput) || 1); setSalesOpen(false); setSalesInput('1'); }}>
                  <Check size={14} strokeWidth={2.5} />
                </button>
                <button className="btn-icon" onClick={() => { setSalesOpen(false); setSalesInput('1'); }}><X size={14} /></button>
              </div>
            )}
          </div>

          {/* Actions */}
          <div style={{ display: 'flex', gap: 10, paddingTop: 6 }}>
            <button className="btn-ghost" style={{ flex: 1, justifyContent: 'center' }} onClick={() => { onEdit(product); onClose(); }}>
              <Edit3 size={14} /> Modifier
            </button>
            {!confirmDelete ? (
              <button className="btn-ghost" style={{ flex: 1, justifyContent: 'center', color: 'var(--rose)' }} onClick={() => setConfirmDelete(true)}>
                <Trash2 size={14} /> Supprimer
              </button>
            ) : (
              <div style={{ flex: 1, display: 'flex', gap: 8 }}>
                <button className="btn-ghost" style={{ flex: 1, justifyContent: 'center', color: 'var(--rose)', borderColor: 'rgba(251,113,133,.4)', background: 'rgba(251,113,133,.08)' }} onClick={() => onDelete(product.id)}>
                  <Check size={14} strokeWidth={2.5} /> Confirmer
                </button>
                <button className="btn-icon" onClick={() => setConfirmDelete(false)}><X size={14} /></button>
              </div>
            )}
          </div>

          <div style={{ fontSize: 11.5, color: 'var(--text-3)', textAlign: 'center', paddingTop: 4 }}>
            Ajouté le {product.addedAt} · Mis à jour le {product.updatedAt}
          </div>
        </div>
      </div>
    </>
  );
};

//  PASSWORD GATE

const DEFAULT_PASSWORD = "dropship2024";

// Simple loading screen while Firebase connects
const LoadingScreen = () => (
  <div style={{ minHeight: '100vh', background: 'var(--bg-0)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 16 }}>
    <div style={{ width: 48, height: 48, borderRadius: 14, background: 'var(--grad-accent)', display: 'flex', alignItems: 'center', justifyContent: 'center', animation: 'gradShift 3s ease infinite' }}>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    </div>
    <div style={{ color: 'var(--text-2)', fontSize: 14 }}>Connexion au cloud…</div>
  </div>
);

const PasswordGate = ({ correctPassword, onUnlock }) => {
  const [pwd, setPwd] = React.useState('');
  const [error, setError] = React.useState(false);
  const [shake, setShake] = React.useState(false);

  const attempt = () => {
    if (pwd === correctPassword) {
      onUnlock();
    } else {
      setError(true);
      setShake(true);
      setPwd('');
      setTimeout(() => { setShake(false); setError(false); }, 1800);
    }
  };

  return (
    <div style={{
      minHeight: '100vh', background: 'var(--bg-0)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: 24,
      position: 'relative',
    }}>
      <div className="atmo">
        <div className="atmo-grid" />
        <div className="atmo-third" />
        <div className="atmo-noise" />
      </div>
      <div className="surface surface-glow" style={{
        width: '100%', maxWidth: 400, padding: '40px 36px',
        position: 'relative', zIndex: 1,
        animation: shake ? 'shakeX 0.4s ease' : 'scaleIn .5s cubic-bezier(.2,.8,.2,1)',
        textAlign: 'center',
      }}>
        <style>{`
          @keyframes shakeX {
            0%,100%{transform:translateX(0)}
            20%{transform:translateX(-10px)}
            40%{transform:translateX(10px)}
            60%{transform:translateX(-8px)}
            80%{transform:translateX(8px)}
          }
        `}</style>
        <div style={{
          width: 64, height: 64, borderRadius: 18,
          background: 'var(--grad-accent)', backgroundSize: '200% 200%',
          animation: 'gradShift 6s ease infinite',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          margin: '0 auto 24px',
          boxShadow: '0 16px 40px -10px rgba(139,92,246,.6)',
        }}>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <div style={{ fontWeight: 700, fontSize: 24, letterSpacing: '-0.02em', marginBottom: 6 }}>
          DropHub<span style={{ fontStyle: 'italic', fontFamily: "'Instrument Serif', serif" }}>°</span>
        </div>
        <div style={{ color: 'var(--text-2)', fontSize: 14, marginBottom: 32 }}>
          Accès protégé · Entrez le mot de passe
        </div>
        <div style={{ position: 'relative', marginBottom: 16 }}>
          <input
            className="field"
            type="password"
            placeholder="Mot de passe"
            value={pwd}
            onChange={(e) => { setPwd(e.target.value); setError(false); }}
            onKeyDown={(e) => e.key === 'Enter' && attempt()}
            style={{
              textAlign: 'center', fontSize: 16, letterSpacing: '0.1em',
              borderColor: error ? 'rgba(251,113,133,.6)' : undefined,
              boxShadow: error ? '0 0 0 4px rgba(251,113,133,.15)' : undefined,
            }}
            autoFocus
          />
        </div>
        {error && (
          <div style={{ color: 'var(--rose)', fontSize: 13, marginBottom: 14, animation: 'fadeIn .3s ease' }}>
            Mot de passe incorrect. Réessayez.
          </div>
        )}
        <button className="btn-primary" style={{ width: '100%', justifyContent: 'center', fontSize: 15, padding: '12px 20px' }} onClick={attempt}>
          Accéder →
        </button>
        <div style={{ marginTop: 24, fontSize: 11.5, color: 'var(--text-3)' }}>
          DropHub Business OS · Usage privé
        </div>
      </div>
    </div>
  );
};

function App() {
  const [authenticated, setAuthenticated] = React.useState(false);
  const [view, setView] = useState('dashboard');
  const [products, setProducts] = useState([]);
  const [appPassword, setAppPassword] = useState(DEFAULT_PASSWORD);
  const [syncStatus, setSyncStatus] = useState('loading');
  const [loadingTimeout, setLoadingTimeout] = useState(false);
  const [selected, setSelected] = useState(null);
  const [editProduct, setEditProduct] = useState(null);
  const [addOpen, setAddOpen] = useState(false);
  const [toast, setToast] = useState(null);

  // After 5s, don't block on loading screen even if Firebase is slow
  useEffect(() => {
    const t = setTimeout(() => setLoadingTimeout(true), 5000);
    return () => clearTimeout(t);
  }, []);

  const showToast = useCallback((msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2400);
  }, []);

  // ── Firestore real-time sync ──────────────────────────────────────────────
  useEffect(() => {
    // Load password setting (non-blocking)
    db.collection('data').doc('settings').get()
      .then(doc => { if (doc.exists && doc.data().password) setAppPassword(doc.data().password); })
      .catch(() => {});

    // Subscribe to products in real-time
    const unsub = db.collection('data').doc('products')
      .onSnapshot(
        (doc) => {
          const items = doc.exists ? (doc.data().items || []) : [];
          setProducts(items);
          setSyncStatus('synced');
          // Local fallback cache
          try { localStorage.setItem('drophub_products', JSON.stringify(items)); } catch(e) {}
        },
        () => {
          // On error, fall back to localStorage
          setSyncStatus('error');
          try {
            const saved = localStorage.getItem('drophub_products');
            if (saved) setProducts(JSON.parse(saved));
          } catch(e) {}
        }
      );
    return () => unsub();
  }, []);

  // ── Write helpers ─────────────────────────────────────────────────────────
  const saveProducts = useCallback((list) => {
    setSyncStatus('loading');
    db.collection('data').doc('products').set({ items: list })
      .then(() => setSyncStatus('synced'))
      .catch(() => setSyncStatus('error'));
    try { localStorage.setItem('drophub_products', JSON.stringify(list)); } catch(e) {}
  }, []);

  const handleAdd = (p) => {
    const next = [p, ...products];
    setProducts(next);
    saveProducts(next);
    showToast(`"${p.name}" ajouté à ton catalogue`);
  };

  const handleDelete = (id) => {
    const next = products.filter(p => p.id !== id);
    setProducts(next);
    saveProducts(next);
    setSelected(null);
    showToast('Produit supprimé');
  };

  const handleEdit = (updatedProduct) => {
    const next = products.map(p => p.id === updatedProduct.id ? { ...updatedProduct, updatedAt: new Date().toISOString().slice(0, 10) } : p);
    setProducts(next);
    saveProducts(next);
    setEditProduct(null);
    setSelected(updatedProduct);
    showToast(`"${updatedProduct.name}" mis à jour ✓`);
  };

  const handleAddSales = (productId, units) => {
    const next = products.map(p => p.id === productId ? { ...p, unitsSold: (p.unitsSold || 0) + units, updatedAt: new Date().toISOString().slice(0, 10) } : p);
    setProducts(next);
    saveProducts(next);
    const p = next.find(x => x.id === productId);
    setSelected(p);
    showToast(`+${units} vente${units > 1 ? 's' : ''} enregistrée${units > 1 ? 's' : ''}`);
  };

  const handlePasswordChange = useCallback((newPwd) => {
    db.collection('data').doc('settings').set({ password: newPwd })
      .then(() => { setAppPassword(newPwd); showToast('Mot de passe mis à jour ✓'); })
      .catch(() => showToast('Erreur lors de la mise à jour'));
  }, [showToast]);

  const handleBackupJSON = useCallback(() => {
    const blob = new Blob([JSON.stringify(products, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `drophub-backup-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Sauvegarde JSON téléchargée');
  }, [products, showToast]);

  const handleImportJSON = useCallback((file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!Array.isArray(data)) { showToast('Fichier JSON invalide'); return; }
        saveProducts(data);
        showToast(`${data.length} produit${data.length > 1 ? 's' : ''} importé${data.length > 1 ? 's' : ''} ✓`);
      } catch { showToast('Erreur lecture du fichier JSON'); }
    };
    reader.readAsText(file);
  }, [saveProducts, showToast]);

  const handleBackupCSV = useCallback(() => {
    let csv = 'Nom;SKU;Catégorie;Statut;Prix achat;Prix vente TTC;Frais;Unités vendues;CA;Bénéfice\n';
    products.forEach(p => {
      const m = computeProductMetrics(p);
      csv += `${p.name};${p.sku};${p.category};${p.status};${p.purchasePrice.toFixed(2)};${p.sellPriceTTC.toFixed(2)};${m.totalFees.toFixed(2)};${p.unitsSold};${m.revenue.toFixed(2)};${m.totalProfit.toFixed(2)}\n`;
    });
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `drophub-backup-${new Date().toISOString().slice(0, 10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Sauvegarde CSV téléchargée');
  }, [products, showToast]);

  const renderView = () => {
    switch (view) {
      case 'dashboard': return <Dashboard products={products} onOpenProduct={setSelected} />;
      case 'products': return <Products products={products} onOpenProduct={setSelected} onNewProduct={() => setAddOpen(true)} />;
      case 'accounting': return <Accounting products={products} />;
      case 'analytics': return <Analytics products={products} />;
      case 'categories': return <Categories products={products} />;
      case 'settings': return <Settings onPasswordChange={handlePasswordChange} onBackupJSON={handleBackupJSON} onBackupCSV={handleBackupCSV} onImportJSON={handleImportJSON} syncStatus={syncStatus} />;
      default: return null;
    }
  };

  if (syncStatus === 'loading' && products.length === 0 && !authenticated && !loadingTimeout) return <LoadingScreen />;
  if (!authenticated) return <PasswordGate correctPassword={appPassword} onUnlock={() => setAuthenticated(true)} />;

  return (
    <div className="app-root">
      <DesignSystem />

      {/* Atmosphere */}
      <div className="atmo">
        <div className="atmo-grid" />
        <div className="atmo-third" />
        <div className="atmo-noise" />
      </div>

      <Sidebar active={view} onChange={setView} onAdd={() => setAddOpen(true)} />

      <div className="main-wrap" style={{ marginLeft: 248, minHeight: '100vh', position: 'relative', zIndex: 1 }}>
        <Topbar view={view} />
        <main style={{ padding: '28px 28px 120px', maxWidth: 1440, margin: '0 auto' }}>
          <div key={view}>{renderView()}</div>
        </main>
      </div>

      <MobileNav active={view} onChange={setView} onAdd={() => setAddOpen(true)} />

      <AddProductModal
        open={addOpen || !!editProduct}
        onClose={() => { setAddOpen(false); setEditProduct(null); }}
        onSave={editProduct ? handleEdit : handleAdd}
        editProduct={editProduct}
      />

      {selected && (
        <ProductDrawer
          product={selected}
          onClose={() => setSelected(null)}
          onDelete={handleDelete}
          onEdit={(p) => { setEditProduct(p); }}
          onAddSales={handleAddSales}
        />
      )}

      {toast && (
        <div className="toast">
          <div style={{ width: 28, height: 28, borderRadius: 8, background: 'linear-gradient(135deg, #10B981, #34D399)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Check size={15} strokeWidth={2.5} />
          </div>
          <div style={{ fontSize: 13.5, fontWeight: 500 }}>{toast}</div>
        </div>
      )}

      <style>{`
        @media (max-width: 900px) {
          .main-wrap { padding-bottom: 100px; }
        }
      `}</style>
    </div>
  );
}


// ── Mount ────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
